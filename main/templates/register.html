{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Join FlavorMap 🚀</h2>
    <p class="text-muted">Create your account to start reviewing restaurants.</p>
    <hr>

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            {{ form.as_p }}
        </div>

        <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

    <p class="mt-3">
        Already have an account?
        <a href="{% url 'login' %}">Login here</a>
    </p>
</div>
{% endblock %}
