<h2>Restaurants</h2>

{% for r in restaurants %}
    <div>
        <h3>
            <a href="{% url 'restaurant_detail' r.id %}">
                {{ r.name }}
            </a>
        </h3>

        <p>{{ r.description }}</p>
        <p>Category: {{ r.category }}</p>
        <p>Location: {{ r.location }}</p>
        <p>Price: {{ r.price_range }}</p>
        <p>Rating: {{ r.average_rating }}</p>
    </div>
{% endfor %}
